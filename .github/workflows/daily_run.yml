name: RSI Divergence Daily Run

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write settings.json
        run: |
          python - <<'EOF'
          import json, os
          with open('config/settings.json', 'r') as f:
              cfg = json.load(f)
          cfg['telegram']['enabled'] = True
          cfg['telegram']['bot_token'] = os.environ['TELEGRAM_BOT_TOKEN']
          cfg['telegram']['chat_id'] = os.environ['TELEGRAM_CHAT_ID']
          cfg['google_sheets']['enabled'] = True
          cfg['google_sheets']['webapp_url'] = os.environ['SHEETS_WEBAPP_URL']
          cfg['google_sheets']['shared_secret'] = os.environ['SHEETS_SECRET']
          with open('config/settings.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print('settings.json updated with secrets')
          EOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEETS_WEBAPP_URL: ${{ secrets.SHEETS_WEBAPP_URL }}
          SHEETS_SECRET: ${{ secrets.SHEETS_SECRET }}

      - name: Run backtest
        run: python main.py --mode backtest --markets india

      - name: Save database back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add database/trades.db
          git diff --staged --quiet || git commit -m "Update trades.db [skip ci]"
          git push
